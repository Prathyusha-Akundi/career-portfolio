<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <defs>
    <style>
      .bg-circle { 
        fill: currentColor;
        opacity: 0.08;
      }
      .pa-text {
        fill: currentColor;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 900;
        font-size: 48px;
        letter-spacing: -1.5px;
      }
      @media (prefers-color-scheme: dark) {
        .bg-circle { fill: #FFFFFF; }
        .pa-text { fill: #FFFFFF; }
      }
    </style>
  </defs>
  
  <!-- Subtle background circle -->
  <circle cx="64" cy="64" r="56" class="bg-circle"/>
  
  <!-- Minimal border ring -->
  <circle cx="64" cy="64" r="56" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
  
  <!-- PA initials - clean typography -->
  <text x="64" y="74" text-anchor="middle" class="pa-text">PA</text>
</svg>
